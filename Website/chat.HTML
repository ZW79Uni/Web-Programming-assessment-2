<!DOCTYPE html>
<html>
<style>
.container {
    width: 2485px;  
    height: 1250px;
    border:5px solid black;
    box-sizing: border-box;  
}

.Logo {
    border:5px solid black;
    width: 440px;
    height: 258px;
    float: left;
    box-sizing: border-box;
}

.Nav {
    border:5px solid black;
    width: 2030px;  
    height: 258px;
    float: left;
    box-sizing: border-box;  
}

.chatPicker {
    border:5px solid black;
    width: 440px;
    height: 992px;
    float: left;
    box-sizing: border-box;
}

.chat {
    border:5px solid black;
    width: 2030px;  
    height: 992px;
    float: left;
    box-sizing: border-box;  
}

.clearfix::after {
    content: "";
    clear: both;
    display: table;
}
</style>
<body>
<div class="container clearfix">
    <div class="Logo">
        <h1>Logo here</h1>
    </div>
    <div class="Nav">
        <h1>Navigation here</h1>
    </div>
    <div class="chatPicker">
        <h1>Pick chat here</h1>
    </div>
    <div class="chat">
        <h1>chat here</h1>
    </div>
</div>
</body>
</html>
