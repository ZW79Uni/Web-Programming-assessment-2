<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid black;
        }

        .title {
            font-size: 24px;
        }

        .login-btn {
            padding: 5px 10px;
            border: 1px solid black;
            text-decoration: none;
            color: black;
            display: inline-block;
        }

        .nav {
            display: flex;
            border-bottom: 1px solid black;
        }

        .nav a {
            flex: 1;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-right: 1px solid black;
            color: black;
        }

        .nav a:last-child {
            border-right: none;
        }

        .container {
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .login-box {
            width: 70%;
            border: 1px solid black;
        }

        .login-tabs {
            display: flex;
            border-bottom: 1px solid black;
        }

        .login-tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            border-right: 1px solid black;
            font-size: 20px;
        }

        .login-tab:last-child {
            border-right: none;
        }

        .login-content {
            padding: 30px 20px;
            text-align: center;
        }

        .input-box {
            width: 70%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid black;
            box-sizing: border-box;
        }

        .small-text {
            margin: 8px 0;
        }

        .sign-in-btn {
            padding: 8px 20px;
            border: 1px solid black;
            background: none;
            cursor: pointer;
        }

        .footer {
            border-top: 1px solid black;
            padding: 20px;
            margin-top: 80px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">TITLE OF THE WEBSITE</div>
        <a href="login.html" class="login-btn">LOGIN</a>
    </div>

   <div class="nav">
    <a href="about.html">ABOUT US</a>
    <a href="#">EVENT</a>
    <a href="faq.html">FAQ</a>
    <a href="#">EVENTS MEETS WORLD</a>
</div>
    <div class="container">
        <div class="login-box">
            <div class="login-tabs">
                <div class="login-tab">Sign in as customer?</div>
                <div class="login-tab">Sign in as Vendor?</div>
            </div>

            <div class="login-content">
                <input type="text" class="input-box" placeholder="Email or Phone number">
                <br>
               <input type="password" class="input-box" placeholder="Password">
<br>
<button class="sign-in-btn">Sign in</button>
                <div class="small-text">
    Can’t remember your password? 
    <a href="forgot-password.html">Click here</a>
</div>
            </div>
        </div>
    </div>

    <div class="footer">
        COPYRIGHT, ACCOLADES, MAILING LIST, ETC
    </div>

</body>
</html>
